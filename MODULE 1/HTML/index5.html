<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        form {
            width: 320px;
            background-color: white;
            padding: 20px;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, select, textarea {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 12px;
            padding: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        output {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: blue;
        }
    </style>
</head>

<body>

<form onsubmit="event.preventDefault(); document.getElementById('result').value='Registration Successful!';">

    <input type="text" placeholder="Enter your name" required autofocus>

    <input type="email" placeholder="Enter your email" required>

    <input type="date" required>

    <select required>
        <option value="">Select Event Type</option>
        <option>Health Camp</option>
        <option>Cultural Fest</option>
        <option>Sports Meet</option>
    </select>

    <textarea placeholder="Your message" required></textarea>

    <button type="submit">Register</button>

    <output id="result"></output>

</form>

</body>

</html>
