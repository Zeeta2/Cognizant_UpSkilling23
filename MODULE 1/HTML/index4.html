<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        .eventImg {
            width: 150px;
            height: 100px;
            border: 3px solid black;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        caption {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<h2>Past Community Events Gallery</h2>

<table border="1">
    <caption>Memories from Local Community Events</caption>

    <tr>
        <td><img class="eventImg" src="event1.jpg" alt="Tree Plantation Drive" title="Tree Plantation Drive"></td>
        <td><img class="eventImg" src="event2.jpg" alt="Health Camp" title="Health Camp"></td>
        <td><img class="eventImg" src="event3.jpg" alt="Cultural Fest" title="Cultural Fest"></td>
    </tr>

    <tr>
        <td><img class="eventImg" src="event4.jpg" alt="Clean City Campaign" title="Clean City Campaign"></td>
        <td><img class="eventImg" src="event5.jpg" alt="Food Festival" title="Food Festival"></td>
        <td><img class="eventImg" src="event6.jpg" alt="Sports Meet" title="Sports Meet"></td>
    </tr>

</table>

</body>

</html>
